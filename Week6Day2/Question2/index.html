<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Home</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- HTML code goes here -->
    <div id="search-bar">
      <label for="user-id-input">User ID:</label>
      <input id="user-id-input" type="number" placeholder="User Id" />
      <button id="search-button">Search</button>
    </div>

    <p id="message"></p>

    <!-- User -->
    <section class="result-section">
      <table>
        <thead>
          <th>Name</th>
          <th>Email</th>
          <th>Address</th>
          <th>Phone</th>
          <th>Website</th>
        </thead>
        <tbody id="user-table-body"></tbody>
      </table>
    </section>

    <!-- Posts -->
    <section class="result-section">
      <table>
        <thead>
          <th>Title</th>
          <th>Body</th>
        </thead>
        <tbody id="posts-table-body"></tbody>
      </table>
    </section>

    <!-- Todos -->
    <section class="result-section">
      <table>
        <thead>
          <th>Title</th>
          <th>Completed</th>
        </thead>
        <tbody id="todos-table-body"></tbody>
      </table>
    </section>
  </body>
  <script src="script.js"></script>
</html>
